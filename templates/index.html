<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>FinTrack - Inicio</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark text-white">
    <!-- Implementando fondo oscuro -->
    <div
      class="container d-flex flex-column justify-content-center align-items-center vh-100"
    >
      <h1 class="display-3 fw-bold text-info">FinTrack</h1>
      <!-- Acento en cian/info -->
      <p class="lead mb-4">Motor de Reglas Automáticas y Gestión Financiera.</p>

      <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
        <!-- El enlace apunta a la URL de login que definió en su @login_required -->
        <a
          href="/accounts/login/"
          class="btn btn-info btn-lg px-4 gap-3 text-dark fw-bold"
        >
          Iniciar Sesión
        </a>
      </div>
    </div>
  </body>
</html>
