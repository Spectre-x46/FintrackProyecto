{% extends "base.html" %} {% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh">
  <div class="col-md-5">
    <div class="card shadow p-4">
      <!-- Header -->
      <div class="text-center">
        <i class="fa-solid fa-stethoscope fa-3x icon-basecolor"></i>
        <h3 class="mt-2 fw-bold text-basecolor">Bienvenido(a)</h3>
        <p class="text-muted mb-0">Inicia sesión para continuar</p>
      </div>

      <!-- Formulario -->
      <form method="POST">
        {% csrf_token %}

        <!-- ERRORES -->
        {% if form.errors %}
        <div class="alert alert-danger">
          <i class="fa-solid fa-triangle-exclamation me-2"></i>
          Usuario o contraseña incorrectos.
        </div>
        {% endif %}

        <!-- Usuario -->
        <div class="mb-3">
          <label for="id_username" class="form-label">Usuario</label>
          <input type="text" name="username" id="id_username" class="form-control" placeholder="Ingresar usuario"
            required />
        </div>

        <!-- Contraseña -->
        <div class="mb-3">
          <label for="id_password" class="form-label">Contraseña</label>
          <input type="password" name="password" id="id_password" class="form-control" placeholder="Ingresar contraseña"
            required />
        </div>

        <!-- Botón -->
        <div class="mb-2">
          <button type="submit" class="btn btn-estandar w-100">
            <i class="fa-solid fa-right-to-bracket me-1"></i>
            <span>Iniciar Sesión</span>
          </button>
        </div>

        <!-- Redirección -->
        <input type="hidden" name="next" value="{{ next }}" />
      </form>
    </div>
  </div>
</div>
{% endblock %}
